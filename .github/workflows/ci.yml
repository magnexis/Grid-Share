name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GridShare.slnx

      - name: Build
        run: dotnet build GridShare.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test GridShare.slnx --configuration Release --no-build --logger trx
